steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/pgmentor/pgmentor-backend:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/pgmentor/pgmentor-backend:latest'
      - '.'

  # 2. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/pgmentor/pgmentor-backend'

  # 3. Deploy to Cloud Run (env vars direct, ALLOWED_ORIGINS via env-vars-file to handle commas)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pgmentor-backend
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/pgmentor/pgmentor-backend:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=300'
      - '--set-env-vars=NODE_ENV=production,GOOGLE_CLOUD_PROJECT=pgmentor-ver-1,SUPABASE_URL=https://qnguxwmrqwcksspujmoa.supabase.co,APP_URL=https://www.pgmentor.in,ADMIN_EMAIL=drnarayanak@gmail.com'
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/pgmentor/pgmentor-backend:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/pgmentor/pgmentor-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY

