[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ═══════════════════════════════════════════════════════════════
# API Proxy — handled by the Edge Function at netlify/edge-functions/api-proxy.ts
# The Edge Function injects X-API-Key from the BACKEND_API_KEY env var
# (stored in Netlify dashboard — never hardcoded here).
# ═══════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════
# Blog OG Card Proxy — Route /blog/* to backend for SSR meta tags
# ═══════════════════════════════════════════════════════════════
[[redirects]]
  from = "/blog/*"
  to = "https://pgmentor-backend-441308586999.us-central1.run.app/blog/:splat"
  status = 200
  force = true

# ═══════════════════════════════════════════════════════════════
# SPA Fallback — Serve index.html for all non-file routes
# ═══════════════════════════════════════════════════════════════
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ═══════════════════════════════════════════════════════════════
# Security Headers
# ═══════════════════════════════════════════════════════════════
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# ═══════════════════════════════════════════════════════════════
# Static Asset Caching — Vite hashed assets get long cache
# ═══════════════════════════════════════════════════════════════
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
