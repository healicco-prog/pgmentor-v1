[build]
  command = "npm run build"
  publish = "dist"

# Redirect all /api/* requests to the Cloud Run backend
# The API key is injected server-side via custom headers
[[redirects]]
  from = "/api/*"
  to = "https://CLOUD_RUN_BACKEND_URL/api/:splat"
  status = 200
  force = true
  [redirects.headers]
    X-API-Key = "BACKEND_API_KEY_VALUE"

# SPA fallback — serve index.html for all non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
