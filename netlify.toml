[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ═══════════════════════════════════════════════════════════════
# API Proxy — Route /api/* requests to Cloud Run backend
# The X-API-Key header is injected server-side (not visible to browsers)
# ═══════════════════════════════════════════════════════════════
[[redirects]]
  from = "/api/*"
  to = "https://medimentr-backend-668524975962.asia-south1.run.app/api/:splat"
  status = 200
  force = true
  [redirects.headers]
    # SECURITY: Move this key to Netlify Environment Variables (Settings > Build > Environment)
    # Set BACKEND_API_KEY in Netlify dashboard, then reference it here:
    X-API-Key = "${BACKEND_API_KEY}"

# ═══════════════════════════════════════════════════════════════
# Blog OG Card Proxy — Route /blog/* to backend for SSR meta tags
# ═══════════════════════════════════════════════════════════════
[[redirects]]
  from = "/blog/*"
  to = "https://medimentr-backend-668524975962.asia-south1.run.app/blog/:splat"
  status = 200
  force = true

# ═══════════════════════════════════════════════════════════════
# SPA Fallback — Serve index.html for all non-file routes
# ═══════════════════════════════════════════════════════════════
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ═══════════════════════════════════════════════════════════════
# Security Headers
# ═══════════════════════════════════════════════════════════════
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ═══════════════════════════════════════════════════════════════
# Static Asset Caching — Vite hashed assets get long cache
# ═══════════════════════════════════════════════════════════════
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
